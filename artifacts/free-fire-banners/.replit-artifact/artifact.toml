kind = "web"
previewPath = "/"
title = "Free Fire Login Banners"
version = "1.0.0"
id = "artifacts/free-fire-banners"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18759

[services.development]
run = "pnpm --filter @workspace/free-fire-banners run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/free-fire-banners", "run", "build" ]
publicDir = "artifacts/free-fire-banners/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18759"
BASE_PATH = "/"
